# Pod-to-pod allow-list. default-deny + per-service openings.
# CAVEAT: kindnet ignores NetworkPolicies — these enforce only on Pi5
# microk8s with Cilium/Calico. On kind they're documentation.
#
# Allow matrix:
#   coord       ↔ nanomq:8883, vault42:8443, postgres:5432, all ingress :42069,
#                 z2m/lora :8080 (YARP proxy), wifi2mqtt :8883 probe
#   lora2mqtt   ↔ nanomq:8883, vault42:8443; ingress :8080 from coord
#   zigbee2mqtt ↔ nanomq:8883;                ingress :8080 from coord
#   wifi2mqtt   ↔ nanomq:8883;                ingress :8883 from outside
#   ble2mqtt     ↔ nanomq:8883
#   nanomq      ← all translators + coord
#   vault42     ← coord, lora2mqtt; → postgres:5432
#   postgres    ← coord, vault42
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: coord-allow
spec:
  podSelector:
    matchLabels:
      app: hermod-coordinator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: nanomq
      ports:
        - {protocol: TCP, port: 8883}
        - {protocol: TCP, port: 8081}
    - to:
        - podSelector:
            matchLabels:
              app: vault42
      ports:
        - {protocol: TCP, port: 8443}
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - {protocol: TCP, port: 5432}
    # YARP reverse-proxy + dashboard /healthz polling for z2m and
    # lora2mqtt. Without these the iframe passthrough hangs and the
    # dashboard shows Timeout.
    - to:
        - podSelector:
            matchLabels:
              app: zigbee2mqtt
        - podSelector:
            matchLabels:
              app: lora2mqtt
      ports:
        - {protocol: TCP, port: 8080}
    # wifi2mqtt :8883 TCP probe — dashboard widget reachability check
    # (mqtts:// scheme triggers TCP probe in ProtocolTranslatorHealthChecker).
    - to:
        - podSelector:
            matchLabels:
              app: wifi2mqtt
      ports:
        - {protocol: TCP, port: 8883}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lora2mqtt-allow
spec:
  podSelector:
    matchLabels:
      app: lora2mqtt
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: hermod-coordinator
      ports:
        - {protocol: TCP, port: 8080}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: nanomq
      ports:
        - {protocol: TCP, port: 8883}
    - to:
        - podSelector:
            matchLabels:
              app: vault42
      ports:
        - {protocol: TCP, port: 8443}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zigbee2mqtt-allow
spec:
