kind: NetworkPolicy
metadata:
  name: nanomq-allow
spec:
  podSelector:
    matchLabels:
      app: nanomq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: hermod-coordinator
        - podSelector:
            matchLabels:
              app: lora2mqtt
        - podSelector:
            matchLabels:
              app: zigbee2mqtt
        - podSelector:
            matchLabels:
              app: wifi2mqtt
        - podSelector:
            matchLabels:
