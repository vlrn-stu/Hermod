apiVersion: v1
kind: ConfigMap
metadata:
  name: lora2mqtt-config
  namespace: hermod
data:
  appsettings.json: |
    {
      "Logging": {
        "LogLevel": {
          "Default": "Information",
          "Microsoft.Hosting.Lifetime": "Information",
          "LoRa2MQTT": "Debug"
        }
      },
      "Kestrel": {
        "Endpoints": {
          "Http": {
            "Url": "http://0.0.0.0:8080"
          }
        }
      },
      "LoRa": {
        "MockMode": false,
        "SerialPort": "/dev/ttyUSB0",
        "BaudRate": 115200,
        "Channel": 18,
        "Address": 0,
        "NetworkId": 0,
        "SpreadingFactor": 7,
        "TransmitPower": 22,
        "EnableRssi": true
      },
      "Mqtt": {
        "Host": "nanomq.hermod.svc.cluster.local",
        "Port": 1883,
        "ClientId": "lora2mqtt",
        "BaseTopic": "lora",
        "Username": null,
        "Password": null,
        "KeepAliveSeconds": 60,
        "CleanSession": true
      },
      "Mock": {
        "IntervalMs": 10000,
        "Devices": []
      },
      "Vault42": {
        "Authority": "http://vault42.hermod.svc.cluster.local:8080"
      }
    }
