# Hermod Secrets — REFERENCE ONLY, not applied by kustomize.
#
# Cluster Secrets are managed imperatively by lib/ensure-secrets.sh
# so a `kubectl apply -k` cannot overwrite real passwords with placeholders.
# Values below are the `default` fallback the lib uses when the operator
# picks [D]efault or passes --default-secrets.

apiVersion: v1
kind: Secret
metadata:
  name: hermod-secrets
  namespace: hermod
type: Opaque
stringData:
  mqtt-username: hermod-service
  mqtt-password: change-me-in-production
---
apiVersion: v1
kind: Secret
metadata:
  name: nanomq-credentials
  namespace: hermod
type: Opaque
stringData:
  username: hermod-service
  password: change-me-in-production
---
apiVersion: v1
kind: Secret
metadata:
  name: hermod-db-credentials
  namespace: hermod
type: Opaque
stringData:
  hermod-db-password: hermod-app-password-change-me
---
apiVersion: v1
kind: Secret
metadata:
  name: nanomq-http-admin
  namespace: hermod
type: Opaque
stringData:
  # NanoMQ HTTP management API (:8081) basic-auth — kept out of the
  # ConfigMap so config leaks can't expose broker admin credentials.
  http-user: admin
  http-password: change-me-in-production
---
apiVersion: v1
kind: Secret
metadata:
  name: vault42-seed-credentials
  namespace: hermod
type: Opaque
stringData:
  # Bootstrap passwords for the three Vault42 seed accounts. vault42
  # deletes the seed after first apply, so these only matter for first
  # login — rotate via the dashboard after. The render-seed init
  # container drops any account whose password matches the literal
  # "DISABLED" so an operator can skip viewer/user seeding entirely.
  # Real values are written by ensure-secrets.sh; the placeholder
  # values here are never deployed (this base/secrets.yaml is excluded
  # from the kustomization and only kept as a schema reference).
  viewer-password: PLACEHOLDER-OVERWRITTEN-BY-ENSURE-SECRETS
  user-password: PLACEHOLDER-OVERWRITTEN-BY-ENSURE-SECRETS
  operator-password: PLACEHOLDER-OVERWRITTEN-BY-ENSURE-SECRETS
