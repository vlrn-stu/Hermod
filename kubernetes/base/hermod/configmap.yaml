apiVersion: v1
kind: ConfigMap
metadata:
  name: hermod-config
  namespace: hermod
data:
  # Every Hermod:* section is present so the full control surface is
  # visible in one place; overlays patch only the keys they need.
  appsettings.Production.json: |
    {
      "Logging": {
        "LogLevel": {
          "Default": "Information",
          "Microsoft.AspNetCore": "Warning",
          "Hermod": "Information"
        }
      },
      "AllowedHosts": "*",
      "Hermod": {
        "Mqtt": {
          "Host": "nanomq.hermod.svc.cluster.local",
          "Port": 1883,
          "ClientId": "hermod-coordinator",
          "KeepAliveSeconds": 60,
          "CleanSession": true,
          "ReconnectBufferSize": 0,
          "Topics": {
            "Zigbee": "zigbee/#",
            "Lora": "lora/#",
            "Bluetooth": "bluetooth/#",
            "Wifi": "wifi/#",
            "System": "hermod/#"
          }
        },
        "Database": {
          "ConnectionString": "Host=postgres.hermod.svc.cluster.local;Port=5432;Database=hermod;Username=hermod_app"
        },
        "ProtocolTranslators": {
          "Zigbee2Mqtt": {
            "Enabled": true,
            "Url": "http://zigbee2mqtt.hermod.svc.cluster.local:8080"
          },
          "Ble2Mqtt": {
            "Enabled": true
          },
          "Lora2Mqtt": {
            "Enabled": true,
            "Url": "http://lora2mqtt.hermod.svc.cluster.local:8080"
          }
        },
        "Features": {
          "DeviceStateTracking": true,
          "MessagePersistence": true,
          "RuleAuditLog": true,
          "StatsRollup": true,
          "RuleCache": true,
          "MetricsEndpoint": false
        },
        "Storage": {
          "Mode": "Postgres",
          "WriteBatchSize": 256,
          "WriteFlushIntervalMs": 500,
          "WriteQueueCapacity": 50000,
          "DeviceWriteBatchSize": 512,
          "DeviceWriteFlushIntervalMs": 25,
          "DeviceWriteQueueCapacity": 200000,
          "MaxPoolSize": 50,
          "MinPoolSize": 5,
          "CommandTimeoutSeconds": 30,
          "KeepAliveSeconds": 30,
          "MaxAutoPrepare": 20,
          "SkipDeviceExistenceCheck": true,
          "FastDeviceUpserts": true
        },
        "Engine": {
          "Parallelism": 0,
          "BatchSize": 64,
          "QueueCapacity": 10000,
          "LogBatching": true,
          "LogBatchSize": 100,
          "LogBatchIntervalMs": 1000,
          "RuleCacheRefreshSeconds": 5
        },
        "Seed": {
          "Devices": false,
          "Rules": false
        },
        "Dev": {
          "Endpoints": false
        }
      }
    }
