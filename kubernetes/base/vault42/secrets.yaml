# vault42/secrets.yaml — REFERENCE ONLY, not applied by kustomize.
#
# Values below are the [D]efault fallback for ensure-secrets.sh.
# Including this file in the kustomization would reset a real signing
# key on `apply -k`, force JWT rotation, and log every user out.
# --auto-secrets mode generates 32-byte base64 crypto keys and 24-char
# random DB passwords.
apiVersion: v1
kind: Secret
metadata:
  name: vault42-secrets
  namespace: hermod
  labels:
    app: vault42
    component: authentication
type: Opaque
stringData:
  master-key: CHANGE-THIS-VAULT-MASTER-KEY-IN-PRODUCTION
  hmac-secret: CHANGE-THIS-VAULT-HMAC-SECRET-IN-PRODUCTION
  signing-key: CHANGE-THIS-VAULT-SIGNING-KEY-IN-PRODUCTION
  db-mig-password: vault-mig-password-change-me
  db-app-password: vault-app-password-change-me
