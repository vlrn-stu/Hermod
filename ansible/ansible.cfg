[defaults]
# Inventory defaults
inventory            = inventory/hosts.yml

# Roles path
roles_path           = roles

# Reduce noise in output
stdout_callback      = default
result_format        = yaml

# SSH settings
remote_user          = hermod
host_key_checking    = False
timeout              = 30

# Retry files in a predictable location
retry_files_enabled  = False

# Enable pipelining for speed (requires requiretty disabled on target)
pipelining           = True

# Facts caching to speed up repeated runs
fact_caching         = memory

[privilege_escalation]
become               = True
become_method        = sudo
become_user          = root
become_ask_pass      = False

[ssh_connection]
ssh_args             = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining           = True
