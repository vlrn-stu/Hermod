---
# prod path — images are expected to already exist at {{ hermod_image_registry }}.
# This task verifies pullability and writes a kustomize image override that
# swaps the three locally-named images to their registry-qualified equivalents.

- name: hermod_images/prod | Write kustomize image overrides for this deploy
  ansible.builtin.copy:
    dest: "{{ hermod_install_path }}/Hermod/kubernetes/overlays/prod/images.env"
    content: |
      # Generated by hermod_images role — DO NOT EDIT.
      # This file is consumed by the prod kustomize overlay's imageTag patch.
      HERMOD_IMAGE_REGISTRY={{ hermod_image_registry }}
      HERMOD_IMAGE_TAG={{ hermod_image_tag }}
    owner: "{{ hermod_user }}"
    group: "{{ hermod_user }}"
    mode: "0644"
  become: true
  tags: [images, prod]

- name: hermod_images/prod | Verify Vault42 image pullable from Pi
  # The published Vault42 image is pulled by kubelet from
  # ghcr.io/42-v/vault42 at the version pinned in the deployment
  # manifest. This task confirms an image with that registry prefix is
  # present in containerd's local store, either already cached from a
  # previous pull or pre-loaded by the operator on a network-isolated
  # host. A missing image surfaces here cleanly instead of as a kubelet
  # ImagePullBackOff at rollout.
  ansible.builtin.command:
    cmd: "microk8s ctr images list -q | grep -E '^{{ hermod_image_registry }}/vault42:'"
  register: _vault42_image_present
  changed_when: false
  failed_when: _vault42_image_present.rc != 0
  become: true
  tags: [images, prod]
  when: hermod_image_registry is defined

- name: hermod_images/prod | Vault42 image present
  ansible.builtin.debug:
    msg: "Vault42 image present in microk8s containerd."
  when: _vault42_image_present is defined and _vault42_image_present.rc == 0
  tags: [images, prod]
