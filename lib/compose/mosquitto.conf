# wifi2mqtt — mosquitto bridge for the docker-compose Hermod stack.
# Wi-Fi devices (Tasmota, ESPHome, Shelly, …) connect here; the bridge
# republishes everything upstream to nanomq under wifi/<original-topic>.

listener 1883 0.0.0.0
allow_anonymous true
persistence false
log_dest stdout
log_type error
log_type warning
log_type notice

connection hermod-upstream
address nanomq:1883
remote_clientid wifi2mqtt-bridge
keepalive_interval 60
cleansession true
notifications false
try_private false
bridge_protocol_version mqttv311
bridge_attempt_unsubscribe false

# All locally-published topics fan out to upstream prepended with wifi/.
topic # out 1 "" wifi/

# Command topics flow back down so rule-engine actions reach Wi-Fi devices.
topic +/set        in 1 "" wifi/
topic +/cmnd/#     in 1 "" wifi/
topic +/message    in 1 "" wifi/
