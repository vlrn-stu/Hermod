# nanomq broker config for the docker-compose Hermod stack.
# Mirrors the dev tunings in kubernetes/base/nanomq/configmap.yaml; trimmed
# to the keys actually load-bearing for compose deployments.

mqtt {
    property_size = 32
    max_packet_size = 256KB
    max_mqueue_len = 2048
    retry_interval = 10s
    keepalive_multiplier = 1.25
}

listeners.tcp {
    bind = "0.0.0.0:1883"
}

listeners.ws {
    bind = "0.0.0.0:8083/mqtt"
}

http_server {
    port = 8081
    enable = true
    parallel = 4
}

log {
    to = [console]
    level = warn
}

auth {
    # Dev compose requires CONNECT credentials. nanomq_pwd.conf is
    # mounted alongside this file by docker-compose. Every service in
    # the stack picks it up via MQTT_USERNAME + MQTT_PASSWORD env
    # defaults; an operator who flips MQTT_USERNAME also adds the
    # matching line to nanomq_pwd.conf.
    allow_anonymous = false
    no_match = deny
    password = {include "/etc/nanomq/nanomq_pwd.conf"}
}
