# nanomq plaintext-password file for the docker-compose dev stack.
# Format: one line per user, "username: password" — no quotes, no
# escapes, no comments past the first colon. nanomq reads this on
# startup; no live reload, restart the broker after editing.
#
# This file is dev-only. Prod Pi nanomq uses the kubernetes overlay's
# nanomq-acl init container with per-user TLS client cert + ACL
# (kubernetes/overlays/prod/nanomq-prod.yaml). Do NOT copy this user
# layout to prod; the threat model is different there.
#
# Default credential matches the env defaults baked into
# docker-compose.yaml: MQTT_USERNAME=hermod-service,
# MQTT_PASSWORD=change-me-mqtt. Override either env in your local
# shell to deviate; the matching username MUST exist in this file or
# CONNECT fails.

hermod-service: change-me-mqtt
